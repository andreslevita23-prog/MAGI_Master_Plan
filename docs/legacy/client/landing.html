<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PROSPERITY</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #000;
      color: #FFD700;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
    }
    img {
      width: 180px;
      max-width: 80vw;
      height: auto;
      margin-bottom: 30px;
    }
    h1 {
      font-size: 3em;
      margin: 0;
    }
    p {
      font-size: 1.2em;
      margin-top: 10px;
      color: #ccc;
    }
    .btn {
      margin-top: 20px;
      background-color: #00ff99;
      color: #000;
      padding: 12px 24px;
      font-size: 1em;
      font-weight: bold;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      transition: background-color 0.3s;
      text-decoration: none;
    }
    .btn:hover {
      background-color: #00cc7a;
    }
    footer {
      position: absolute;
      bottom: 20px;
      font-size: 0.9em;
      color: #555;
    }
    @media (max-width: 480px) {
      h1 {
        font-size: 2em;
      }
      p {
        font-size: 1em;
      }
      .btn {
        font-size: 0.9em;
        padding: 10px 20px;
      }
    }
  </style>
</head>
<body>
  <img src="/logo.png" alt="Logo Prosperity" />
  <h1>PROSPERITY INDEX PRO</h1>
  <p>Sistema de trading algorítmico inteligente</p>
  <p style="margin-top: 30px; color: #00FF99;">✅ Servidor activo</p>
  <a href="/dashboard.html" class="btn">📊 Ir a la Consola</a>

  <footer>
    Desarrollado por <strong>Andres Trading Systems</strong> &mdash; 2025
  </footer>
</body>
</html>
